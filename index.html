<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI 日报 - AI News Hub</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<header>
  <h1>AI 日报</h1>
  <p class="subtitle">自动聚合 AI 发展与 AI 工具新闻</p>
  <p id="updated-at" class="updated-at">加载中...</p>
  <p id="debug-line" class="debug-line">分类数量：- ・ 来源数量：-</p>
</header>

<main>
  <div class="controls">
    <input id="search" type="text" placeholder="搜索标题...">
    <div class="filter-row">
      <span class="filter-label">分类</span>
      <div id="categoryFilters" class="filters category-filters"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">来源</span>
      <div id="sourceFilters" class="filters source-filters"></div>
    </div>
  </div>
  <div id="news-list" class="news-list"></div>
  <p id="empty-state" class="empty-state" hidden>没有匹配的新闻</p>
</main>

<footer>
  <p>数据来源：Google News / TechCrunch / VentureBeat / Hacker News，由 GitHub Actions 定时抓取</p>
</footer>

<script src="app.js"></script>
</body>
</html>
